<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koryo Pronounce - 엔진 비교 분석</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 768px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }
        }
        .engine-card {
            padding: 15px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .engine-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .score-badge {
            padding: 4px 10px;
            border-radius: 20px;
            background: #eee;
            font-size: 0.9em;
        }
        .acoustic-theme { border-top: 4px solid #4CAF50; }
        .whisper-theme { border-top: 4px solid #2196F3; }
        
        .char-box {
            display: inline-block;
            padding: 2px 6px;
            margin: 2px;
            border-radius: 4px;
            background: #f0f0f0;
            font-size: 0.85em;
        }
        .high-conf { background: #e8f5e9; color: #2e7d32; }
        .low-conf { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Koryo-Pronounce (Step 9)</h1>
            <p>Acoustic vs WhisperX 하이브리드 엔진 비교</p>
        </header>

        <main>
            <div class="card sentence-card">
                <h3>따라 읽어보세요</h3>
                <h2 id="target-sentence">안녕하세요</h2>
                <div class="sentence-controls">
                    <button class="btn-icon" onclick="changeSentence()"><i class="fas fa-random"></i> 다른 문장</button>
                </div>
            </div>

            <div class="record-container">
                <button id="record-btn" class="record-btn">
                    <i class="fas fa-microphone"></i>
                </button>
                <p id="record-status">버튼을 눌러 녹음 시작</p>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>두 엔진에서 병렬 분석 중입니다...</p>
            </div>

            <div id="result-wrapper" class="hidden">
                <!-- 0. Hybrid Summary (Main Score) -->
                <div class="card result-card" style="margin-bottom: 20px; border: 2px solid #673AB7;">
                    <h3>최종 하이브리드 점수</h3>
                    <div class="score-circle" style="background: #ede7f6;">
                        <span id="hybrid-score">0</span>
                        <small>점</small>
                    </div>
                    <p style="text-align: center; color: #673AB7; font-weight: bold;">[인식 신뢰도 60% + 조음 정밀도 40%]</p>
                </div>

                <div class="comparison-grid">
                    <!-- 1. Acoustic Engine (Left) -->
                    <div class="engine-card acoustic-theme">
                        <div class="engine-title">
                            <span><i class="fas fa-wave-square"></i> Acoustic 분석</span>
                            <span class="score-badge" id="acoustic-score">0점</span>
                        </div>
                        <div class="feedback-section">
                            <ul id="acoustic-feedback"></ul>
                        </div>
                    </div>

                    <!-- 2. WhisperX Engine (Right) -->
                    <div class="engine-card whisper-theme">
                        <div class="engine-title">
                            <span><i class="fas fa-brain"></i> WhisperX 인식</span>
                            <span class="score-badge" id="whisper-score">0점</span>
                        </div>
                        <div id="whisper-result-text" style="margin-bottom:10px; font-weight:bold;"></div>
                        <div id="whisper-alignment" style="margin-bottom:10px;"></div>
                        <div class="feedback-section">
                            <ul id="whisper-feedback"></ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
